<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên hệ - DAT MOBILE</title>
    <link rel="stylesheet" href="css/form.css">
</head>
<body>

    <header>
        <h1>DAT MOBILE</h1>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="sanpham.html">Sản phẩm</a>
            <a href="lienhe.html">Liên hệ</a>
        </nav>
    </header>

    <h2 class="title">Thông tin liên hệ</h2>

    <section class="contact">
        <form onsubmit="sendForm(event)">
            <input type="text" id="product" placeholder="Sản phẩm" readonly>
            <input type="text" placeholder="Họ và tên" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Số điện thoại" required>
            <input type="text" placeholder="Địa chỉ nhận hàng" required>

            <textarea placeholder="Thắc mắc cần tư vấn"></textarea>

            <button type="submit">Gửi liên hệ</button>
        </form>
    </section>
<script>
    const params = new URLSearchParams(window.location.search);
const product = params.get("product");

if(product){
    document.getElementById("product").value = product;
}
function sendForm(event){
    event.preventDefault();
    alert("Nhân viên chăm sóc khách hàng sẽ liên hệ với bạn ngay");
event.target.reset();
}
</script>
</body>
</html>
